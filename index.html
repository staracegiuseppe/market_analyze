<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Multi-Market Scanner</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07090D;color:#D0DFF8;font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0B0E16}::-webkit-scrollbar-thumb{background:#253050;border-radius:2px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.app{display:flex;flex-direction:column;min-height:100vh}

/* HEADER */
.hdr{background:#0B0E16;border-bottom:1px solid #192030;padding:10px 16px;display:flex;justify-content:space-between}

/* TABS */
.tabs{display:flex;border-bottom:1px solid #192030}
.tab{padding:10px 14px;cursor:pointer;color:#6880A0}
.tab.active{color:#fff;border-bottom:2px solid #3D8EF0}

/* CONTENUTO */
.tc{display:none;padding:14px}
.tc.active{display:block}

/* SEZIONI */
.sig-section{margin-bottom:20px}
.sig-section-hdr{font-weight:700;margin-bottom:8px}
.sig-section-hdr.buy{color:#16A34A}
.sig-section-hdr.sell{color:#DC2626}
.sig-section-hdr.watch{color:#2563EB}

/* CARD */
.sig-card{background:#0B0E16;border:1px solid #192030;border-radius:8px;margin-bottom:10px}
.sig-card-hdr{display:flex;justify-content:space-between;padding:12px}
.sig-card-body{padding:12px}

/* INDICATORI */
.ind-row{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.ind-item{background:#0A0F1A;padding:6px;border-radius:6px}
.ind-item-lbl{font-size:9px;color:#6B7280}
.ind-item-val{font-size:12px}

/* LIVELLI */
.livelli-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.livello-box{background:#0A0F1A;padding:6px;border-radius:6px}
.livello-lbl{font-size:9px;color:#6B7280}
.livello-val{font-size:12px;font-weight:700}

/* BOTTONI */
.btn{padding:6px 10px;background:#192030;color:#fff;border:none;cursor:pointer}
</style>
</head>
<body>
<div class="app">

<!-- HEADER -->
<div class="hdr">
  <div><b>MULTI-MARKET SCANNER</b></div>
  <div id="hdr-count">0</div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="showTab('signals')">Signals</div>
  <div class="tab" onclick="showTab('smartmoney')">Smart Money</div>
</div>

<!-- SIGNALS -->
<div class="tc active" id="tab-signals">
  <button class="btn" onclick="refreshScanner()">Refresh</button>
  <div id="sig-grid">Loading...</div>
</div>

<!-- SMART MONEY -->
<div class="tc" id="tab-smartmoney">
  <button class="btn" onclick="refreshSmartMoney()">Aggiorna</button>
  <div id="sm-meta"></div>
  <div id="sm-summary-bar"></div>
  <div id="sm-opportunities"></div>
</div>

</div>

</div><!-- /app -->

<script>

/* ───────── STATE ───────── */
let allSignals=[];
let filters={market:'all',action:'all'};

/* ───────── API ───────── */
function api(path){
  return path;
}

/* ───────── TABS ───────── */
function showTab(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active', TAB_IDS[i]===id));
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('active'));
  document.querySelector(`[onclick="showTab('${id}')"]`).classList.add('active');
  document.getElementById('tab-'+id).classList.add('active');
}

/* ───────── SIGNALS ───────── */

function buildCard(s){
  return `
  <div class="sig-card">
    <div class="sig-card-hdr">
      <div>
        <b>${s.symbol}</b><br>
        ${s.action}
      </div>
      <div>${s.price||''}</div>
    </div>
    <div class="sig-card-body">
      Score: ${s.score||0}
    </div>
  </div>`;
}

function renderSignals(){
  const grid=document.getElementById('sig-grid');

  if(!allSignals.length){
    grid.innerHTML="Nessun dato";
    return;
  }

  grid.innerHTML = allSignals.map(buildCard).join('');
}

/* ───────── LOAD SIGNALS ───────── */
async function loadSignals(){
  try{
    const r=await fetch(api('/api/signals'));
    const d=await r.json();
    allSignals=d.signals||[];
    renderSignals();
    document.getElementById('hdr-count').textContent=allSignals.length;
  }catch(e){
    console.error(e);
  }
}

async function refreshScanner(){
  await loadSignals();
}

/* ───────── SMART MONEY ───────── */

function buildOpportunityCard(o){
  return `
  <div class="sig-card">
    <div class="sig-card-hdr">
      <div>
        <b>${o.company||''}</b><br>
        ${o.ticker||''}
      </div>
      <div>${o.score||0}</div>
    </div>
    <div class="sig-card-body">
      ${o.why_matters||''}
    </div>
  </div>`;
}

function _renderSmartMoney(d){
  const opps=d.opportunities||[];

  document.getElementById('sm-meta').textContent =
    "Opportunità: "+opps.length;

  document.getElementById('sm-summary-bar').innerHTML =
    `<div>Totale: ${opps.length}</div>`;

  document.getElementById('sm-opportunities').innerHTML =
    opps.map(buildOpportunityCard).join('');
}

async function loadSmartMoney(){
  try{
    const r=await fetch(api('/api/smart-money'));
    const d=await r.json();
    _renderSmartMoney(d);
  }catch(e){
    console.error(e);
  }
}

async function refreshSmartMoney(){
  await loadSmartMoney();
}

/* ───────── INIT ───────── */
async function init(){
  await loadSignals();
}

window.addEventListener('DOMContentLoaded', init);

</script>
</body>
</html>
